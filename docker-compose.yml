services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "5000"
      RUN_SCHEDULER: "false"
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health/live').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "start:scheduler"]
    environment:
      RUN_SCHEDULER: "true"
    depends_on:
      web:
        condition: service_healthy
